{% extends "base.html" %}

{% block content %}
<div class="search-container">
    <h2>Find Your Route</h2>
    <form action="{{ url_for('find_route') }}" method="POST" class="search-form">
        <div class="form-group">
            <label for="source">From:</label>
            <select name="source" id="source" required>
                <option value="">Select source station</option>
                {% for station in stations %}
                <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="destination">To:</label>
            <select name="destination" id="destination" required>
                <option value="">Select destination station</option>
                {% for station in stations %}
                <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit" class="btn-primary">Find Route</button>
    </form>
</div>

<div class="info-section">
    <h3>About Hyperloop</h3>
    <p>Experience the future of transportation with our state-of-the-art Hyperloop system. 
       Travel at unprecedented speeds while enjoying comfort and safety.</p>
</div>
{% endblock %}
